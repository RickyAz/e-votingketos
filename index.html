<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Voting OSIS Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between">

    <header class="bg-white border-b border-slate-200 px-6 py-4 shadow-sm flex items-center justify-center gap-3">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-md shadow-blue-200 text-xl">🗳️</div>
        <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">E-Voting Pemilihan Ketua OSIS</h1>
    </header>

    <main class="container mx-auto p-4 max-w-4xl flex-grow flex items-center justify-center py-10">
        
        <div id="box-identitas" class="w-full max-w-md bg-white p-8 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100 transition-all">
            <h2 class="text-xl font-bold text-slate-800 mb-1">Verifikasi Pemilih</h2>
            <p class="text-xs text-slate-400 mb-6">Masukkan Nomor Induk Siswa Anda untuk memeriksa hak pilih.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-1.5">Nomor Induk Siswa (NIS)</label>
                    <input type="text" id="nis" placeholder="Contoh: 20261001" class="w-full p-3 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-medium transition-all">
                </div>
                <button onclick="verifikasiDanMuatKandidat()" id="btn-masuk" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 transition-all transform active:scale-[0.98]">
                    Masuk ke Bilik Suara
                </button>
            </div>
        </div>

        <div id="box-bilik-suara" class="hidden w-full">
            <div class="text-center mb-8">
                <span class="bg-blue-50 text-blue-600 text-xs font-bold px-3 py-1.5 rounded-full uppercase tracking-widest border border-blue-100">Surat Suara Digital</span>
                <h2 class="text-2xl font-extrabold text-slate-800 mt-2">Gunakan Hak Suara Anda Secara Bijak</h2>
                <p id="display-nis" class="text-sm text-slate-400 mt-1">NIS Pemilih: --</p>
            </div>
            
            <div id="container-kandidat" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>

    </main>

    <footer class="text-center p-4 border-t border-slate-200/50 bg-white text-xs font-semibold text-slate-400">
        &copy; 2026 Panitia Pemilihan Umum OSIS. All Rights Reserved.
    </footer>

    <script>
        // ======= TEMPELKAN URL GOOGLE APPS SCRIPT ANDA DI SINI =======
        const GAS_VOTING_URL = "https://script.google.com/macros/s/AKfycbwh5EYKRktHTDOfm0DxKeVRxPcPibsng8yWFzaQ3kgk4YcScxWxSraF9VKjHzljkkdUtA/exec"; 
        // ============================================================

        let nisPemilih = "";

function verifikasiDanMuatKandidat() {
    const inputNis = document.getElementById('nis').value.trim();
    if(!inputNis) return alert('Silakan masukkan NIS Anda terlebih dahulu!');
    
    nisPemilih = inputNis;
    const btn = document.getElementById('btn-masuk');
    btn.innerText = "Memverifikasi...";
    btn.disabled = true;

    // Menambahkan parameter acak (?t=...) di ujung URL untuk menghancurkan cache browser lama
    const urlDenganAntiCache = GAS_VOTING_URL + "?t=" + new Date().getTime();

    fetch(urlDenganAntiCache)
    .then(res => {
        if(!res.ok) throw new Error("Koneksi ditolak oleh server Google (CORS/Auth Error).");
        return res.json();
    })
    .then(res => {
        if(res.success) {
            document.getElementById('display-nis').innerText = `NIS Pemilih: ${nisPemilih}`;
            let htmlCard = "";
            
            if(res.data.length === 0) {
                alert("Peringatan: Data kandidat di Google Sheets masih kosong!");
                return;
            }

            res.data.forEach(paslon => {
                htmlCard += `
                    <div class="bg-white border border-slate-200/80 rounded-2xl p-6 shadow-sm hover:shadow-md transition-all text-center flex flex-col justify-between">
                        <div>
                            <div class="w-16 h-16 bg-blue-50 border border-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-2xl font-black mx-auto mb-4">
                                0${paslon.id}
                            </div>
                            <h3 class="text-lg font-bold text-slate-800">${paslon.nama}</h3>
                            <div class="text-left bg-slate-50 border border-slate-100 p-4 rounded-xl my-4 min-h-[120px]">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block mb-1">Visi & Misi</span>
                                <p class="text-slate-600 text-xs leading-relaxed whitespace-pre-line">${paslon.visi_misi}</p>
                            </div>
                        </div>
                        <button onclick="eksekusiVoting(${paslon.id})" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 rounded-xl shadow-md shadow-emerald-100 transition-all transform active:scale-[0.98]">
                            Coblos Paslon 0${paslon.id}
                        </button>
                    </div>
                `;
            });
            
            document.getElementById('container-kandidat').innerHTML = htmlCard;
            document.getElementById('box-identitas').classList.add('hidden');
            document.getElementById('box-bilik-suara').classList.remove('hidden');
        }
    })
    .catch(err => {
        // Mengarahkan ke pesan solusi jika fetch gagal akibat CORS browser
        alert(`Gagal Memuat Data.\n\nSolusi: Pastikan Setelan Deploy Apps Script Anda sudah diatur ke 'Anyone/Siapa Saja'.\n\nDetail Eror: ${err.message}`);
    })
    .finally(() => {
        btn.innerText = "Masuk ke Bilik Suara";
        btn.disabled = false;
    });
}

function eksekusiVoting(idPaslon) {
    if(!confirm(`Apakah Anda yakin ingin memilih Paslon 0${idPaslon}? Pilihan tidak dapat diubah.`)) return;

    // Menggunakan teknik alternatif URLSearchParams jika POST JSON biasa diblokir di browser sekolah
    fetch(GAS_VOTING_URL, {
        method: "POST",
        mode: "cors",
        headers: {
            "Content-Type": "text/plain;charset=utf-8" // Menggunakan text/plain menghindari pre-flight CORS blocks
        },
        body: JSON.stringify({
            nis: nisPemilih,
            pilihan_id: idPaslon
        })
    })
    .then(res => res.json())
    .then(res => {
        if(res.success) {
            alert("🎉 Terima kasih! Suara Anda telah berhasil direkam dalam basis data.");
            window.location.reload();
        } else {
            alert(`🚫 Akses Ditolak:\n${res.error}`);
            window.location.reload();
        }
    })
    .catch(err => {
        alert("Gagal mengirim suara ke server: " + err.message);
    });
}
    </script>
</body>
</html>
